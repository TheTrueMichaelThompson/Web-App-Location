<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Daily Check-In">
<title>Daily Check-In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg:#0a0a0c; --surface:#111115; --border:#1d1d22;
  --text:#ececef; --dim:#6b6b72;
  --fin:#39d353; --acad:#4ca8ff; --diet:#b07cff; --phys:#ff8a4c;
  --ment:#e8c84a; --la:#7ec8e3; --soc:#ff6b9d;
}
html,body { height:100%; background:var(--bg); color:var(--text); font-family:'Inter',-apple-system,sans-serif; overflow:hidden; }
.screen { position:fixed; inset:0; display:none; flex-direction:column; }
.screen.active { display:flex; animation:fadein .22s ease; }
@keyframes fadein { from{opacity:0} to{opacity:1} }

/* INTRO */
#screen-intro { justify-content:center; align-items:center; gap:32px; padding:48px 32px; text-align:center; }
.intro-eyebrow { font-family:'JetBrains Mono',monospace; font-size:.65rem; letter-spacing:.18em; text-transform:uppercase; color:var(--dim); }
.intro-domains { display:flex; flex-direction:column; gap:10px; }
.intro-domains span { font-family:'JetBrains Mono',monospace; font-size:.82rem; font-weight:600; letter-spacing:.1em; text-transform:uppercase; }
.btn-start { padding:18px 52px; background:var(--text); color:var(--bg); font-family:'Inter',sans-serif; font-weight:700; font-size:1rem; border:none; border-radius:14px; cursor:pointer; }
.btn-start:active { opacity:.82; }

/* QUESTION */
#q-bar-track { height:3px; background:var(--border); flex-shrink:0; }
#q-bar-fill { height:100%; transition:width .4s ease,background-color .35s ease; width:0; }
#q-header { display:flex; align-items:center; justify-content:space-between; padding:14px 22px 10px; flex-shrink:0; }
#q-domain-label { font-family:'JetBrains Mono',monospace; font-size:.68rem; letter-spacing:.14em; text-transform:uppercase; font-weight:500; }
#q-counter { font-family:'JetBrains Mono',monospace; font-size:.68rem; color:var(--dim); }
#q-body { flex:1; display:flex; flex-direction:column; justify-content:center; padding:0 24px; gap:32px; overflow:hidden; }
#q-question { font-size:1.2rem; font-weight:600; line-height:1.42; white-space:pre-line; }
#q-input-area { display:flex; flex-direction:column; gap:12px; }
#q-footer { padding:18px 24px 36px; flex-shrink:0; }
.btn-next { width:100%; padding:18px; background:var(--text); color:var(--bg); font-family:'Inter',sans-serif; font-weight:700; font-size:1rem; border:none; border-radius:14px; cursor:pointer; opacity:.18; transition:opacity .2s; }
.btn-next.ready { opacity:1; }

/* HOURS */
.hours-val { text-align:center; font-family:'JetBrains Mono',monospace; font-size:4.5rem; font-weight:700; line-height:1; }
.hours-unit { font-size:1rem; font-weight:400; color:var(--dim); margin-left:6px; }
.hours-btns { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
.h-btn { padding:15px 0; background:var(--surface); border:1.5px solid var(--border); color:var(--text); font-family:'JetBrains Mono',monospace; font-size:1rem; font-weight:600; border-radius:10px; cursor:pointer; }
.h-btn:active { background:#1a1a20; }

/* NUMBER (integer) */
.num-val { text-align:center; font-family:'JetBrains Mono',monospace; font-size:4.5rem; font-weight:700; line-height:1; }

/* TEXT FIELD */
.tfield-wrap { display:flex; align-items:baseline; gap:10px; justify-content:center; }
.tfield-prefix { font-family:'JetBrains Mono',monospace; font-size:2rem; color:var(--dim); flex-shrink:0; }
.tfield-suffix { font-family:'JetBrains Mono',monospace; font-size:1.2rem; color:var(--dim); flex-shrink:0; }
.tfield { background:transparent; border:none; border-bottom:2.5px solid var(--border); color:var(--text); font-family:'JetBrains Mono',monospace; font-size:2.8rem; font-weight:700; padding:8px 4px; outline:none; text-align:center; width:180px; -moz-appearance:textfield; transition:border-color .2s; }
.tfield::-webkit-outer-spin-button,.tfield::-webkit-inner-spin-button { -webkit-appearance:none; }
.tfield:focus { border-bottom-color:currentColor; }
.field-hint { font-size:.7rem; color:var(--dim); letter-spacing:.05em; text-align:center; }

/* SLIDER */
.slider-num { text-align:center; font-family:'JetBrains Mono',monospace; font-size:4.5rem; font-weight:700; line-height:1; transition:color .18s; }
.slider-hint { text-align:center; font-size:.68rem; letter-spacing:.1em; text-transform:uppercase; color:var(--dim); margin-top:-4px; }
input[type=range] { -webkit-appearance:none; width:100%; height:5px; border-radius:3px; background:var(--border); outline:none; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:32px; height:32px; border-radius:50%; background:var(--text); cursor:pointer; box-shadow:0 2px 10px rgba(0,0,0,.55); }
.slider-labels { display:flex; justify-content:space-between; gap:8px; }
.slider-labels span { flex:1; font-size:.68rem; color:var(--dim); line-height:1.45; }
.slider-labels span:nth-child(2) { text-align:center; }
.slider-labels span:last-child { text-align:right; }

/* YES / NO */
.yn-btns { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.yn-btn { padding:24px; font-family:'Inter',sans-serif; font-size:1.05rem; font-weight:700; border-radius:14px; border:2px solid transparent; cursor:pointer; transition:opacity .15s; }
.yn-btn.yes { background:rgba(57,211,83,.1); color:#39d353; border-color:#39d353; }
.yn-btn.no { background:rgba(224,89,63,.1); color:#e0593f; border-color:#e0593f; }
.yn-btn.dim { opacity:.28; }

/* CHOICE */
.choice-btn { width:100%; padding:15px 18px; background:var(--surface); border:1.5px solid var(--border); color:var(--text); font-family:'Inter',sans-serif; font-size:.9rem; font-weight:500; border-radius:12px; cursor:pointer; text-align:left; display:block; transition:all .15s; }
.choice-btn.selected { background:rgba(255,255,255,.07); border-color:var(--text); }

/* MULTISELECT */
.multi-btn { width:100%; padding:15px 18px; background:var(--surface); border:1.5px solid var(--border); color:var(--dim); font-family:'Inter',sans-serif; font-size:.9rem; font-weight:500; border-radius:12px; cursor:pointer; text-align:left; display:block; transition:all .15s; }
.multi-btn.active { background:rgba(255,255,255,.07); border-color:var(--text); color:var(--text); }

/* ACTIVITY SELECT (physical) */
.act-row { display:flex; align-items:center; justify-content:space-between; padding:13px 16px; background:var(--surface); border:1.5px solid var(--border); border-radius:12px; }
.act-label { font-size:.9rem; font-weight:500; color:var(--text); flex:1; }
.act-counter { display:flex; align-items:center; gap:12px; }
.act-btn { width:36px; height:36px; background:#16161a; border:1.5px solid var(--border); color:var(--text); font-size:1.1rem; font-weight:700; border-radius:8px; cursor:pointer; line-height:1; }
.act-btn:active { background:#222228; }
.act-count { font-family:'JetBrains Mono',monospace; font-size:1.1rem; font-weight:700; min-width:20px; text-align:center; }
.act-nothing { width:100%; padding:13px 16px; background:var(--surface); border:1.5px solid var(--border); color:var(--dim); font-family:'Inter',sans-serif; font-size:.9rem; font-weight:500; border-radius:12px; cursor:pointer; text-align:left; transition:all .15s; }
.act-nothing.active { background:rgba(255,255,255,.07); border-color:var(--text); color:var(--text); }

/* GRADE PICKER */
.grade-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
.grade-btn { padding:16px 8px; background:var(--surface); border:1.5px solid var(--border); color:var(--dim); font-family:'JetBrains Mono',monospace; font-size:.95rem; font-weight:700; border-radius:10px; cursor:pointer; text-align:center; transition:all .15s; }
.grade-btn.selected { color:var(--text); border-color:var(--text); background:rgba(255,255,255,.08); }
.grade-f { grid-column:2; }

/* SCORECARD */
#screen-scorecard { overflow-y:auto; -webkit-overflow-scrolling:touch; }
#sc-ribbon { height:5px; display:flex; flex-shrink:0; }
.sc-ribbon-seg { flex:1; }
#sc-hero { padding:36px 24px 24px; text-align:center; border-bottom:1px solid var(--border); }
#sc-grade { font-family:'JetBrains Mono',monospace; font-size:6rem; font-weight:700; line-height:1; animation:popIn .4s cubic-bezier(.175,.885,.32,1.275); }
@keyframes popIn { from{opacity:0;transform:scale(.7)} to{opacity:1;transform:scale(1)} }
#sc-numeric { font-family:'JetBrains Mono',monospace; font-size:1rem; color:var(--dim); margin-top:6px; }
#sc-meta { font-size:.72rem; letter-spacing:.09em; text-transform:uppercase; color:var(--dim); margin-top:8px; }
#sc-exist { padding:16px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:16px; }
.exist-label { font-family:'JetBrains Mono',monospace; font-size:.65rem; letter-spacing:.1em; text-transform:uppercase; color:var(--dim); white-space:nowrap; }
.exist-grade { font-family:'JetBrains Mono',monospace; font-size:2rem; font-weight:700; }
.exist-note { font-size:.75rem; color:var(--dim); line-height:1.5; }
.sc-row { padding:16px 24px; border-bottom:1px solid var(--border); }
.sc-row-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.sc-row-name { font-family:'JetBrains Mono',monospace; font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; font-weight:600; }
.sc-row-grade { font-family:'JetBrains Mono',monospace; font-size:1.2rem; font-weight:700; }
.sc-bar-bg { height:4px; background:var(--border); border-radius:2px; overflow:hidden; margin-bottom:8px; }
.sc-bar-fill { height:100%; border-radius:2px; width:0; transition:width .7s ease; }
.sc-fail-tag { font-size:.72rem; color:#e0593f; font-weight:600; margin-bottom:4px; }
.sc-comment { font-size:.78rem; color:var(--dim); line-height:1.55; }
.btn-done { display:block; margin:20px 24px 48px; padding:16px; width:calc(100% - 48px); background:var(--surface); border:1.5px solid var(--border); color:var(--dim); font-family:'Inter',sans-serif; font-size:.9rem; font-weight:600; border-radius:14px; cursor:pointer; text-align:center; }
</style>
</head>
<body>

<!-- INTRO -->
<div id="screen-intro" class="screen">
  <div class="intro-eyebrow">Daily Check-In</div>
  <div class="intro-domains">
    <span style="color:var(--fin)">Financial</span>
    <span style="color:var(--acad)">Academic</span>
    <span style="color:var(--diet)">Dietary</span>
    <span style="color:var(--phys)">Physical</span>
    <span style="color:var(--ment)">Mental Health</span>
    <span style="color:var(--la)">Life Admin</span>
    <span style="color:var(--soc)">Social</span>
    <span style="color:var(--dim)">Alignment</span>
  </div>
  <button class="btn-start" onclick="startSurvey()">Begin</button>
</div>

<!-- QUESTION -->
<div id="screen-question" class="screen">
  <div id="q-bar-track"><div id="q-bar-fill"></div></div>
  <div id="q-header">
    <span id="q-domain-label"></span>
    <span id="q-counter"></span>
  </div>
  <div id="q-body">
    <div id="q-question"></div>
    <div id="q-input-area"></div>
  </div>
  <div id="q-footer">
    <button class="btn-next" id="q-next" onclick="advance()">Next</button>
  </div>
</div>

<!-- SCORECARD -->
<div id="screen-scorecard" class="screen">
  <div id="sc-ribbon"></div>
  <div id="sc-hero">
    <div id="sc-grade"></div>
    <div id="sc-numeric"></div>
    <div id="sc-meta"></div>
  </div>
  <div id="sc-exist"></div>
  <div id="sc-domains"></div>
  <button class="btn-done" onclick="resetToIntro()">Done</button>
</div>

<script>
/* ── DOMAIN COLORS ── */
const DC = {
  financial:'#39d353', academic:'#4ca8ff', dietary:'#b07cff',
  physical:'#ff8a4c',  mental:'#e8c84a',  lifeadmin:'#7ec8e3',
  social:'#ff6b9d',    existential:'#6b6b72',
};
const SCORED = ['financial','academic','dietary','physical','mental','lifeadmin','social'];

/* ── GRADE UTILITIES ── */
const GRADES = ['A+','A','A-','B+','B','B-','C+','C','C-','D+','D','D-','F'];
function scoreToGrade(s){
  if(s>=9.8)return'A+'; if(s>=9.2)return'A';  if(s>=8.5)return'A-';
  if(s>=8.0)return'B+'; if(s>=7.2)return'B';  if(s>=6.5)return'B-';
  if(s>=6.0)return'C+'; if(s>=5.0)return'C';  if(s>=4.5)return'C-';
  if(s>=4.0)return'D+'; if(s>=3.0)return'D';  if(s>0)   return'D-';
  return'F';
}
function gradeColor(g){
  if(!g)return'#6b6b72';
  if(g.startsWith('A'))return'#39d353';
  if(g.startsWith('B'))return'#59d97a';
  if(g.startsWith('C'))return'#e8c84a';
  if(g.startsWith('D'))return'#ff8a4c';
  return'#e0593f';
}
function gradeDistance(g1,g2){
  const i1=GRADES.indexOf(g1),i2=GRADES.indexOf(g2);
  return(i1<0||i2<0)?99:Math.abs(i1-i2);
}
function clamp(v,lo=0,hi=10){return Math.min(hi,Math.max(lo,v));}

/* ── SCORING ── */
function scoreFinancial(income,costs){
  const s=income-costs;
  if(s<0)    return{s:0,  fail:`Budget deficit of $${Math.abs(Math.round(s)).toLocaleString()}/mo`};
  if(s<200)  return{s:clamp(1+(s/200)*2)};
  if(s<500)  return{s:clamp(3+((s-200)/300)*2)};
  if(s<1000) return{s:clamp(5+((s-500)/500)*2)};
  if(s<2000) return{s:clamp(7+((s-1000)/1000)*2)};
  return{s:clamp(Math.min(10,9+(s-2000)/1000))};
}

function scoreAcademic(inTerm,classAvg,assignsDone,assignsBehind,readHours){
  const done=!inTerm?true:assignsDone;
  const behind=!inTerm?0:(assignsBehind||0);
  let assignBase=done?6:Math.max(0,6-behind*1.5);
  const restore=Math.min(6-assignBase,readHours*0.75);
  const effectAssign=assignBase+restore;
  const readScore=Math.min(4,readHours);
  let raw=Math.min(10,effectAssign+readScore);
  if(inTerm&&classAvg!=null) raw=Math.min(classAvg/10,raw);
  return{s:clamp(raw)};
}

function scoreDietary(fasting,ateOnFast,caloricBalance,dietPhase){
  if(fasting){
    return ateOnFast?{s:0,fail:'Fast broken - instant fail'}:{s:10};
  }
  const isBulk=(dietPhase==='bulking');
  const isMaint=(dietPhase==='maint');
  if(isMaint){
    const dev=Math.abs(caloricBalance);
    if(dev<=200)return{s:9}; if(dev<=400)return{s:7};
    if(dev<=700)return{s:5}; return{s:3};
  }
  if(isBulk){
    if(caloricBalance>500)  return{s:0,fail:`Surplus of +${caloricBalance} cal exceeds the 500 limit`};
    if(caloricBalance<0)    return{s:2};
    return{s:clamp(3+(caloricBalance/500)*7)};
  } else {
    if(caloricBalance<-500) return{s:0,fail:`Deficit of ${caloricBalance} cal exceeds the -500 limit`};
    if(caloricBalance>0)    return{s:2};
    return{s:clamp(3+(Math.abs(caloricBalance)/500)*7)};
  }
}

function scorePhysical(acts,dietPhase,fasting){
  const walk=acts.walk||0, gym=acts.gym||0, hike=acts.hike||0;
  const intense=gym+hike;
  const noReal=walk===0&&intense===0;
  if(fasting){
    if(intense>0)return{s:0,fail:'Gym or hike while fasting - instant fail'};
    if(noReal)return{s:7};
    return{s:Math.min(10,6+walk)};
  }
  const isBulk=(dietPhase==='bulking');
  if(isBulk){
    if(noReal)return{s:0,fail:'No training during bulk - instant fail'};
    if(intense===0)return{s:Math.min(6,3+walk*1.5)};
    return{s:Math.min(10,7+(intense-1)*1.5+(walk>0?0.5:0))};
  } else {
    if(intense>1)return{s:0,fail:'More than one intense session during restricted phase'};
    if(noReal)return{s:4};
    if(intense===0)return{s:Math.min(7,5+walk*0.5)};
    return{s:9};
  }
}

function scoreMental(mood,ddDays,mastDays,selfLimit){
  if(ddDays===0)return{s:0,fail:'DoorDash ordered today - instant fail'};
  const moodPts=(mood/10)*2;
  const ddPts=ddDays>=14?2:ddDays>=7?1.5:ddDays>=3?1:0.5;
  const mastPts=mastDays<4?0:mastDays<7?2:3;
  let slPts;
  if(selfLimit<=2)       slPts=3;
  else if(selfLimit<=10) slPts=2.5;
  else if(selfLimit<=25) slPts=1.5;
  else if(selfLimit<=50) slPts=0.5;
  else                   slPts=0;
  return{s:clamp(moodPts+ddPts+mastPts+slPts)};
}

function scoreLifeAdmin(reminders,aptStatus){
  const remPts=reminders===0?5:reminders===1?4:reminders===2?3:reminders<=4?1.5:0;
  const aptPts=aptStatus==='clean'?5:aptStatus==='hesitant'?3:0;
  return{s:clamp(remPts+aptPts)};
}

function scoreSocial(acts){
  const eff=acts.filter(a=>a!=='none');
  if(eff.length===0)return{s:0,fail:'No social engagement reported'};
  const pts={apartment:1,stranger:2,friends:3,newFriend:4,girl:4};
  let total=0; eff.forEach(a=>{total+=(pts[a]||0);});
  if(eff.length===1&&total<=1)return{s:2};
  if(eff.length===1)           return{s:4.5};
  if(total<=3) return{s:5};  if(total<=5) return{s:6.5};
  if(total<=8) return{s:7.5};if(total<=11)return{s:9};
  return{s:10};
}

function domainComment(domain,score,failReason,a){
  if(failReason)return null;
  const s=score;
  if(domain==='financial'){
    const sur=Math.round((a.fin_income||0)-(a.fin_costs||0));
    if(s>=8)return`$${sur.toLocaleString()}/mo surplus. Strong financial position.`;
    if(s>=5)return`$${sur.toLocaleString()}/mo surplus. More Uber hours would improve this.`;
    return`$${sur.toLocaleString()}/mo surplus. Revenue and cost gap needs to close.`;
  }
  if(domain==='academic'){
    const hrs=a.acad_reading||0;
    if(s>=8)return`Assignments on track. ${hrs}h of reading today. Solid.`;
    if(s>=5)return`${hrs>0?hrs+'h read.':'No reading.'} Buffer compliance is the lever to pull.`;
    return'Academic day underperformed. Both assignments and reading need attention.';
  }
  if(domain==='dietary'){
    if(a.diet_fasting)return'Fast maintained. Optimal execution.';
    const bal=a.diet_balance||0;
    const ph=a.diet_phase||'cutting';
    if(s>=8)return`Balance of ${bal>0?'+':''}${bal} cal. On target for ${ph}.`;
    if(s>=5)return`Balance of ${bal>0?'+':''}${bal} cal. Closer to the target would score higher.`;
    return`Balance of ${bal>0?'+':''}${bal} cal. Significantly off target for ${ph}.`;
  }
  if(domain==='physical'){
    if(s>=8)return'Training output matches what this phase demands.';
    if(s>=5)return'Acceptable activity level given current context.';
    return'Physical output below what this phase requires.';
  }
  if(domain==='mental'){
    const sl=a.mh_selflimit||0;
    const dd=a.mh_doordash||0;
    const mast=a.mh_masturb||0;
    if(s>=8)return`${dd} days off DoorDash. ${mast} days clean. Self-limiting at ${sl}/100.`;
    if(s>=5)return`Self-limiting was ${sl}/100. Watch the compulsion patterns.`;
    return`Mental discipline was weak today. Self-limiting at ${sl}/100 is the main problem.`;
  }
  if(domain==='lifeadmin'){
    const rem=a.la_reminders||0;
    if(s>=8)return`${rem} reminder${rem!==1?'s':''} left. Admin is under control.`;
    if(s>=5)return`${rem} reminder${rem!==1?'s':''} remaining. Apartment and task list both need attention.`;
    return'Life admin backlog is significant. Prioritize clearing it tomorrow.';
  }
  if(domain==='social'){
    if(s>=8)return'Strong social day. These interactions compound.';
    if(s>=5)return'Some engagement today. Aim for more variety next time.';
    return'Minimal social contact. Isolation is a compounding problem.';
  }
  return'';
}

function computeAllScores(){
  const fasting=ans.diet_fasting===true;
  const dietPhase=fasting?'cutting':(ans.diet_phase||'cutting');
  const fin=scoreFinancial(ans.fin_income||0,ans.fin_costs||0);
  const acad=scoreAcademic(ans.acad_term===true,ans.acad_avg,ans.acad_buffer===true,ans.acad_behind||0,ans.acad_reading||0);
  const diet=scoreDietary(fasting,ans.diet_broke===true,ans.diet_balance||0,dietPhase);
  const phys=scorePhysical(ans.phys_acts||{walk:0,gym:0,hike:0},dietPhase,fasting);
  const ment=scoreMental(ans.mh_mood||5,ans.mh_doordash||0,ans.mh_masturb||0,ans.mh_selflimit||0);
  const la=scoreLifeAdmin(ans.la_reminders||0,ans.la_apt);
  const soc=scoreSocial(ans.social_acts||[]);
  const scores=[fin.s,acad.s,diet.s,phys.s,ment.s,la.s,soc.s];
  const avg=scores.reduce((a,b)=>a+b,0)/scores.length;
  return{financial:fin,academic:acad,dietary:diet,physical:phys,mental:ment,lifeadmin:la,social:soc,average:avg};
}

/* ── STEPS ── */
let ans={},steps=[],idx=0;

function buildSteps(){
  return[
    // FINANCIAL
    {id:'fin_income',   domain:'financial',   type:'currency',   q:'Monthly-ized Income\n(from your budget spreadsheet)',        show:()=>true},
    {id:'fin_costs',    domain:'financial',   type:'currency',   q:'Monthly-ized Total Cost of Living',                          show:()=>true},
    // ACADEMIC
    {id:'acad_term',    domain:'academic',    type:'yesno',      q:'Are you currently in a school term?',                        show:()=>true},
    {id:'acad_avg',     domain:'academic',    type:'slider',     q:'Current grade average across all classes',                   min:0,max:100,lo:'0%',mid:'50%',hi:'100%',show:()=>ans.acad_term===true},
    {id:'acad_buffer',  domain:'academic',    type:'yesno',      q:'Have you completed all assignments due within your Safety Buffer Days?', show:()=>ans.acad_term===true},
    {id:'acad_behind',  domain:'academic',    type:'number',     q:'How many assignments in that window are still incomplete?',  show:()=>ans.acad_term===true&&ans.acad_buffer===false},
    {id:'acad_reading', domain:'academic',    type:'hours',      q:'How many hours did you read today?',                         show:()=>true},
    // DIETARY
    {id:'diet_fasting', domain:'dietary',     type:'yesno',      q:'Are you currently in a fasting period?',                    show:()=>true},
    {id:'diet_broke',   domain:'dietary',     type:'yesno',      q:'Did you eat or drink anything other than your special support drink today?', show:()=>ans.diet_fasting===true},
    {id:'diet_phase',   domain:'dietary',     type:'choice',     q:'What is your current eating phase?',
      choices:[{v:'cutting',l:'Cutting - working toward a caloric deficit'},{v:'bulking',l:'Bulking - working toward a caloric surplus'},{v:'maint',l:'Maintenance'}],
      show:()=>ans.diet_fasting===false},
    {id:'diet_balance', domain:'dietary',     type:'caloric',    q:'Open MyFitnessPal and enter your caloric balance for today', show:()=>ans.diet_fasting===false},
    // PHYSICAL
    {id:'phys_acts',    domain:'physical',    type:'actselect',  q:'What physical activity did you do today?',                   show:()=>true},
    // MENTAL
    {id:'mh_mood',      domain:'mental',      type:'slider',     q:'Subjectively, how are you doing today?',                    lo:'Struggling',mid:'Getting by',hi:'Thriving',show:()=>true},
    {id:'mh_doordash',  domain:'mental',      type:'days',       q:'How many days since your last DoorDash order?\n(0 if you ordered today)', show:()=>true},
    {id:'mh_masturb',   domain:'mental',      type:'days',       q:'How many days since you last jerked off?\n(0 if today — the goal is 4 or more)', show:()=>true},
    {id:'mh_selflimit', domain:'mental',      type:'slider',     q:'How much did you give in to the urge to slow down today?\n0 = never gave in  /  100 = completely surrendered',
      min:0,max:100,lo:'Never gave in',mid:'Gave in some',hi:'Completely surrendered',show:()=>true},
    // LIFE ADMIN
    {id:'la_reminders', domain:'lifeadmin',   type:'number',     q:'How many "Due Today" reminders remain in your iPhone right now?', show:()=>true},
    {id:'la_apt',       domain:'lifeadmin',   type:'choice',     q:'There\'s a girl at your door who wants to fuck right now. Your apartment is the only thing that could stop it. Based on where it actually stands...',
      choices:[{v:'clean',l:"We\'re good. The apartment isn\'t an issue."},{v:'hesitant',l:"She might push through it, but my place is working against me."},{v:'nope',l:"She\'d leave. The apartment would kill it."}],
      show:()=>true},
    // SOCIAL
    {id:'social_acts',  domain:'social',      type:'multiselect',q:'Which of the following happened today?\nSelect all that apply.',
      options:[{v:'apartment',l:'Left the apartment'},{v:'stranger',l:'Was friendly to a stranger'},{v:'friends',l:'Hung out with friends'},{v:'newFriend',l:'Made a new friend'},{v:'girl',l:'Talked to a girl without being weird'},{v:'none',l:'None of the above'}],
      show:()=>true},
    // EXISTENTIAL
    {id:'exist_pred',   domain:'existential', type:'grade-picker',q:'Without knowing your score yet — what do you think you got today?', show:()=>true},
  ];
}

function visible(){return steps.filter(s=>s.show());}

/* ── SCREENS ── */
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function startSurvey(){ans={};idx=0;steps=buildSteps();renderStep();show('screen-question');}

/* ── RENDERING ── */
function renderStep(){
  const vs=visible();const step=vs[idx];
  if(!step){showScorecard();return;}
  const color=DC[step.domain]||'#ececef';
  document.getElementById('q-bar-fill').style.width=`${((idx+1)/vs.length)*100}%`;
  document.getElementById('q-bar-fill').style.backgroundColor=color;
  const labels={lifeadmin:'Life Admin',existential:'Alignment'};
  document.getElementById('q-domain-label').textContent=(labels[step.domain]||step.domain).toUpperCase();
  document.getElementById('q-domain-label').style.color=color;
  document.getElementById('q-counter').textContent=`${idx+1} / ${vs.length}`;
  document.getElementById('q-question').textContent=step.q;
  const nb=document.getElementById('q-next');
  nb.classList.remove('ready');
  nb.textContent=(idx===vs.length-1)?'See Results':'Next';
  const area=document.getElementById('q-input-area');area.innerHTML='';
  const t=step.type;
  if(t==='hours')       renderHours(step,area,nb,color);
  if(t==='number')      renderNumber(step,area,nb,color);
  if(t==='slider')      renderSlider(step,area,nb,color);
  if(t==='yesno')       renderYesNo(step,area,nb);
  if(t==='choice')      renderChoice(step,area,nb);
  if(t==='currency')    renderCurrency(step,area,nb,color);
  if(t==='caloric')     renderCaloric(step,area,nb,color);
  if(t==='days')        renderDays(step,area,nb,color);
  if(t==='actselect')   renderActSelect(step,area,nb,color);
  if(t==='multiselect') renderMultiselect(step,area,nb);
  if(t==='grade-picker')renderGradePicker(step,area,nb);
  if(ans[step.id]!==undefined&&ans[step.id]!==null)nb.classList.add('ready');
}

function renderHours(step,area,nb,color){
  const v=ans[step.id]??0;ans[step.id]=v;
  area.innerHTML=`<div class="hours-val" id="hval" style="color:${color}">${v}<span class="hours-unit">hrs</span></div>
    <div class="hours-btns"><button class="h-btn" onclick="adjH(-1)">-1</button><button class="h-btn" onclick="adjH(-0.5)">-½</button><button class="h-btn" onclick="adjH(0.5)">+½</button><button class="h-btn" onclick="adjH(1)">+1</button></div>`;
  nb.classList.add('ready');
}
function adjH(d){const s=visible()[idx];ans[s.id]=Math.max(0,Math.round(((ans[s.id]??0)+d)*2)/2);document.getElementById('hval').innerHTML=`${ans[s.id]}<span class="hours-unit">hrs</span>`;document.getElementById('hval').style.color=DC[s.domain];document.getElementById('q-next').classList.add('ready');}

function renderNumber(step,area,nb,color){
  const v=ans[step.id]??0;ans[step.id]=v;
  area.innerHTML=`<div class="num-val" id="nval" style="color:${color}">${v}</div>
    <div class="hours-btns"><button class="h-btn" onclick="adjN(-5)">-5</button><button class="h-btn" onclick="adjN(-1)">-1</button><button class="h-btn" onclick="adjN(1)">+1</button><button class="h-btn" onclick="adjN(5)">+5</button></div>`;
  nb.classList.add('ready');
}
function adjN(d){const s=visible()[idx];const mn=s.min??0,mx=s.max??99;ans[s.id]=Math.max(mn,Math.min(mx,(ans[s.id]??0)+d));document.getElementById('nval').textContent=ans[s.id];document.getElementById('nval').style.color=DC[s.domain];document.getElementById('q-next').classList.add('ready');}

function renderSlider(step,area,nb,color){
  const mn=step.min??1,mx=step.max??10;
  const mid=Math.round((mn+mx)/2);
  const existing=ans[step.id];const display=existing??mid;const isSet=existing!==undefined;
  const disp=mx===100?`${display}%`:`${display}`;
  const midLbl=step.mid?`<span>${step.mid}</span>`:'<span></span>';
  area.innerHTML=`<div class="slider-num" id="snum" style="color:${isSet?color:'var(--dim)'}">${disp}</div>
    ${!isSet?`<div class="slider-hint">slide to set</div>`:''}
    <input type="range" min="${mn}" max="${mx}" step="1" value="${display}" style="accent-color:${color}" oninput="onSlider(this.value)">
    <div class="slider-labels"><span>${step.lo||''}</span>${midLbl}<span>${step.hi||''}</span></div>`;
  if(isSet)nb.classList.add('ready');
}
function onSlider(v){const s=visible()[idx];const c=DC[s.domain];const n=parseInt(v);ans[s.id]=n;const mx=s.max??10;const el=document.getElementById('snum');el.textContent=mx===100?`${n}%`:`${n}`;el.style.color=c;const hint=document.querySelector('.slider-hint');if(hint)hint.remove();document.getElementById('q-next').classList.add('ready');}

function renderYesNo(step,area,nb){
  const cur=ans[step.id];
  area.innerHTML=`<div class="yn-btns"><button class="yn-btn yes ${cur===false?'dim':''}" onclick="onYN(true)">Yes</button><button class="yn-btn no ${cur===true?'dim':''}" onclick="onYN(false)">No</button></div>`;
  if(cur!==undefined)nb.classList.add('ready');
}
function onYN(v){const s=visible()[idx];ans[s.id]=v;document.querySelectorAll('.yn-btn').forEach(b=>{b.classList.remove('dim');const match=(b.classList.contains('yes')&&v)||(b.classList.contains('no')&&!v);if(!match)b.classList.add('dim');});document.getElementById('q-next').classList.add('ready');}

function renderChoice(step,area,nb){
  const cur=ans[step.id];
  area.innerHTML=step.choices.map(c=>`<button class="choice-btn ${cur===c.v?'selected':''}" onclick="onChoice('${c.v}',this)">${c.l}</button>`).join('');
  if(cur!==undefined)nb.classList.add('ready');
}
function onChoice(v,btn){const s=visible()[idx];ans[s.id]=v;document.querySelectorAll('.choice-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');document.getElementById('q-next').classList.add('ready');}

function renderCurrency(step,area,nb,color){
  const existing=ans[step.id];
  area.innerHTML=`<div class="tfield-wrap"><span class="tfield-prefix" style="color:${color}">$</span><input type="number" class="tfield" id="tfield" inputmode="numeric" min="0" step="1" value="${existing??''}" placeholder="0" style="color:${color};border-bottom-color:${color}" oninput="onTField(this.value)"></div><div class="field-hint">Monthly-ized figure from your spreadsheet</div>`;
  if(existing!==undefined)nb.classList.add('ready');
  setTimeout(()=>{const f=document.getElementById('tfield');if(f)f.focus();},100);
}

function renderCaloric(step,area,nb,color){
  const existing=ans[step.id];
  area.innerHTML=`<div class="tfield-wrap"><input type="number" class="tfield" id="tfield" inputmode="numeric" step="1" value="${existing??''}" placeholder="0" style="color:${color};border-bottom-color:${color}" oninput="onTField(this.value)"><span class="tfield-suffix" style="color:${color}">cal</span></div><div class="field-hint">Negative = deficit / Positive = surplus</div>`;
  if(existing!==undefined)nb.classList.add('ready');
  setTimeout(()=>{const f=document.getElementById('tfield');if(f)f.focus();},100);
}

function renderDays(step,area,nb,color){
  const existing=ans[step.id];
  area.innerHTML=`<div class="tfield-wrap"><input type="number" class="tfield" id="tfield" inputmode="numeric" min="0" step="1" value="${existing??''}" placeholder="0" style="color:${color};border-bottom-color:${color}" oninput="onTField(this.value)"><span class="tfield-suffix" style="color:${color}">days</span></div>`;
  if(existing!==undefined)nb.classList.add('ready');
  setTimeout(()=>{const f=document.getElementById('tfield');if(f)f.focus();},100);
}

function onTField(v){const s=visible()[idx];const n=Number(v);if(v!==''&&!isNaN(n)){ans[s.id]=n;document.getElementById('q-next').classList.add('ready');}else{ans[s.id]=undefined;document.getElementById('q-next').classList.remove('ready');}}

function renderActSelect(step,area,nb,color){
  if(!ans[step.id])ans[step.id]={nothing:0,walk:0,gym:0,hike:0};
  const c=ans[step.id];
  area.innerHTML=`<button class="act-nothing ${c.nothing?'active':''}" onclick="onActNothing()">Nothing at all</button>
    ${[{v:'walk',l:'Light walk'},{v:'gym',l:'Gym session'},{v:'hike',l:'Long wilderness hike'}].map(o=>`
    <div class="act-row">
      <span class="act-label">${o.l}</span>
      <div class="act-counter">
        <button class="act-btn" onclick="onActAdj('${o.v}',-1)">-</button>
        <span class="act-count" style="color:${(c[o.v]||0)>0?color:'var(--dim)'}">${c[o.v]||0}</span>
        <button class="act-btn" onclick="onActAdj('${o.v}',1)">+</button>
      </div>
    </div>`).join('')}`;
  nb.classList.add('ready');
}
function onActNothing(){const s=visible()[idx];if(!ans[s.id])ans[s.id]={nothing:0,walk:0,gym:0,hike:0};ans[s.id].nothing=ans[s.id].nothing?0:1;renderActSelect(s,document.getElementById('q-input-area'),document.getElementById('q-next'),DC[s.domain]);}
function onActAdj(v,d){const s=visible()[idx];if(!ans[s.id])ans[s.id]={nothing:0,walk:0,gym:0,hike:0};ans[s.id][v]=Math.max(0,(ans[s.id][v]||0)+d);renderActSelect(s,document.getElementById('q-input-area'),document.getElementById('q-next'),DC[s.domain]);}

function renderMultiselect(step,area,nb){
  if(!ans[step.id])ans[step.id]=[];
  const sel=ans[step.id];
  area.innerHTML=step.options.map(o=>`<button class="multi-btn ${sel.includes(o.v)?'active':''}" onclick="onMulti('${o.v}')">${o.l}</button>`).join('');
  if(sel.length>0)nb.classList.add('ready');
}
function onMulti(v){const s=visible()[idx];if(!ans[s.id])ans[s.id]=[];let sel=[...ans[s.id]];const isNone=v==='none';if(isNone){sel=sel.includes(v)?[]:[v];}else{sel=sel.filter(x=>x!=='none');const i=sel.indexOf(v);if(i>-1)sel.splice(i,1);else sel.push(v);}ans[s.id]=sel;renderMultiselect(s,document.getElementById('q-input-area'),document.getElementById('q-next'));}

function renderGradePicker(step,area,nb){
  const cur=ans[step.id];
  const rows=GRADES.filter(g=>g!=='F').map(g=>`<button class="grade-btn ${cur===g?'selected':''}" onclick="onGrade('${g}')" style="${cur===g?`color:${gradeColor(g)};border-color:${gradeColor(g)}`:''}">${g}</button>`).join('');
  area.innerHTML=`<div class="grade-grid">${rows}<button class="grade-btn grade-f ${cur==='F'?'selected':''}" onclick="onGrade('F')" style="${cur==='F'?`color:${gradeColor('F')};border-color:${gradeColor('F')}`:''}" >F</button></div>`;
  if(cur!==undefined)nb.classList.add('ready');
}
function onGrade(g){const s=visible()[idx];ans[s.id]=g;document.querySelectorAll('.grade-btn').forEach(b=>{b.classList.remove('selected');b.style.color='';b.style.borderColor='';});const btns=[...document.querySelectorAll('.grade-btn')].find(b=>b.textContent.trim()===g);if(btns){btns.classList.add('selected');btns.style.color=gradeColor(g);btns.style.borderColor=gradeColor(g);}document.getElementById('q-next').classList.add('ready');}

function advance(){if(!document.getElementById('q-next').classList.contains('ready'))return;idx++;const vs=visible();if(idx>=vs.length){showScorecard();return;}renderStep();}

/* ── SCORECARD ── */
function showScorecard(){
  const sc=computeAllScores();
  const g=scoreToGrade(sc.average);
  document.getElementById('sc-ribbon').innerHTML=SCORED.map(d=>`<div class="sc-ribbon-seg" style="background:${DC[d]}"></div>`).join('');
  document.getElementById('sc-grade').textContent=g;
  document.getElementById('sc-grade').style.color=gradeColor(g);
  document.getElementById('sc-numeric').textContent=`${sc.average.toFixed(2)} / 10  (7-domain average)`;
  document.getElementById('sc-meta').textContent=new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});

  const pred=ans.exist_pred;
  if(pred){
    const dist=gradeDistance(pred,g);
    const note=dist===0?'Dead on. Your intuition is calibrated.':dist===1?'Off by one grade. Getting there.': `Off by ${dist} grades. Keep building the intuition.`;
    document.getElementById('sc-exist').innerHTML=`<div class="exist-label">You predicted</div><div class="exist-grade" style="color:${gradeColor(pred)}">${pred}</div><div class="exist-note">${note}</div>`;
  } else {
    document.getElementById('sc-exist').style.display='none';
  }

  const domainMeta=[
    {key:'financial',name:'Financial'},{key:'academic',name:'Academic'},
    {key:'dietary',name:'Dietary'},{key:'physical',name:'Physical'},
    {key:'mental',name:'Mental Health'},{key:'lifeadmin',name:'Life Admin'},
    {key:'social',name:'Social'},
  ];
  // Sort best to worst (change 8)
  domainMeta.sort((a,b)=>sc[b.key].s-sc[a.key].s);

  document.getElementById('sc-domains').innerHTML=domainMeta.map(d=>{
    const res=sc[d.key];const ds=res.s;const dg=scoreToGrade(ds);const c=DC[d.key];
    const comment=domainComment(d.key,ds,res.fail,ans);
    return`<div class="sc-row">
      <div class="sc-row-header"><span class="sc-row-name" style="color:${c}">${d.name}</span><span class="sc-row-grade" style="color:${gradeColor(dg)}">${dg}</span></div>
      <div class="sc-bar-bg"><div class="sc-bar-fill" id="bar-${d.key}" style="background:${c}"></div></div>
      ${res.fail?`<div class="sc-fail-tag">${res.fail}</div>`:''}
      ${comment?`<div class="sc-comment">${comment}</div>`:''}
    </div>`;
  }).join('');

  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    domainMeta.forEach(d=>{const el=document.getElementById(`bar-${d.key}`);if(el)el.style.width=`${sc[d.key].s*10}%`;});
  }));

  show('screen-scorecard');
}

function resetToIntro(){ans={};idx=0;steps=[];show('screen-intro');}
show('screen-intro');
</script>
